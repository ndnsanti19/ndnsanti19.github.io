<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDN Matcha Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --matcha-green: #4C6444;
            --matcha-light: #8DAA81;
            --espresso-dark: #2C1E11;
            --cream: #F4F6F0;
            --white: #ffffff;
            --dark-text: #1F2937;
            --alert-red: #EF4444;
        }
    </style>
</head>
<body class="bg-[var(--cream)] text-[var(--dark-text)]">
    <div class="container mx-auto p-6">
        <header class="text-center mb-6 p-6 rounded-3xl bg-white shadow-md border border-slate-200">
            <h1 class="text-3xl font-bold text-[var(--matcha-green)]">NDN Matcha Lab</h1>
            <p class="text-slate-600 mt-2">Analisis minuman kreatif oleh Angga & NDN Team.</p>
            <p class="mt-3"><a href="https://ndnsanti19.github.io/listproject.html" class="text-blue-600 hover:underline" target="_blank" rel="noreferrer noopener">← Kembali ke daftar project</a></p>
        </header>

        <div class="container max-w-2xl mx-auto bg-white p-6 rounded-3xl shadow-lg">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-[var(--espresso-dark)]">Dirty Matcha Analyzer</h2>
                <p class="text-slate-600 mt-2">Simulasi kombinasi espresso dan matcha dengan pendekatan pengalaman NDN.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-[var(--dark-text)] mb-2">Jumlah Shot Espresso</label>
                    <select id="espresso-shot" class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:outline-none focus:border-[var(--matcha-light)] text-sm">
                        <option value="0">Tanpa Espresso (Matcha Murni)</option>
                        <option value="1" selected>1 Shot Espresso</option>
                        <option value="2">2 Shot Espresso (Double)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-[var(--dark-text)] mb-2">Takaran Matcha (Sendok Teh)</label>
                    <input id="matcha-scoop" type="number" min="1" max="4" value="1" class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:outline-none focus:border-[var(--matcha-light)] text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-[var(--dark-text)] mb-2">Waktu Konsumsi</label>
                    <select id="drinking-time" class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:outline-none focus:border-[var(--matcha-light)] text-sm">
                        <option value="pagi">Pagi / Siang Hari</option>
                        <option value="malam">Sore / Malam Hari</option>
                    </select>
                </div>
                <button class="w-full bg-[var(--matcha-green)] text-white py-3 rounded-2xl font-semibold hover:bg-[var(--espresso-dark)] transition" onclick="analyzeDrink()">Analisis Efek</button>
            </div>

            <div id="result" class="result-card mt-8 hidden rounded-3xl bg-[var(--cream)] p-6 border border-slate-200">
                <div class="badge-container flex flex-wrap gap-2 mb-4"></div>
                <h3 class="text-xl font-semibold text-[var(--espresso-dark)]">Estimasi Efek pada Tubuh:</h3>
                <ul class="effect-list mt-3 text-[var(--dark-text)]"></ul>
            </div>
        </div>

        <footer class="mt-10 text-center text-sm text-slate-500">
            <p>&copy; 2026 NDN Matcha Lab — dibangun oleh Angga & NDN Team.</p>
        </footer>
    </div>

    <script>
        function analyzeDrink() {
            const espresso = parseInt(document.getElementById('espresso-shot').value);
            const matcha = parseInt(document.getElementById('matcha-scoop').value) || 1;
            const time = document.getElementById('drinking-time').value;
            const caffeineTotal = (espresso * 64) + (matcha * 35);
            const resultDiv = document.getElementById('result');
            const effectDetails = resultDiv.querySelector('.effect-list');
            const badgeContainer = resultDiv.querySelector('.badge-container');
            badgeContainer.innerHTML = '';
            effectDetails.innerHTML = '';
            const badgeType = document.createElement('span');
            badgeType.className = 'badge badge-matcha px-3 py-1 rounded-full text-xs text-white bg-[var(--matcha-green)]';
            badgeType.innerText = espresso === 0 ? 'Pure Matcha' : 'Dirty Matcha';
            const badgeCaffeine = document.createElement('span');
            badgeCaffeine.className = 'badge badge-caffeine px-3 py-1 rounded-full text-xs text-white bg-[var(--matcha-light)] text-[var(--dark-text)]';
            badgeCaffeine.innerText = `${caffeineTotal} mg Kafein`;
            badgeContainer.appendChild(badgeType);
            badgeContainer.appendChild(badgeCaffeine);
            const effects = [];
            if (caffeineTotal < 120) effects.push('Energi ringan, fokus santai.');
            else effects.push('Stimulasi lebih kuat, cocok untuk tugas kreatif.');
            if (time === 'malam') effects.push('Pantau agar tidak mengganggu tidur malam.');
            else effects.push('Bagus untuk awal hari produktif.');
            if (espresso >= 2) effects.push('Sensasi hangat dan lebih ‘wake-up’ untuk ide cepat.');
            effects.forEach(effect => {
                const li = document.createElement('li');
                li.innerText = effect;
                effectDetails.appendChild(li);
            });
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
